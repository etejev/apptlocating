<script>

document.addEventListener('click', function(event) {
  var dropdownLink = event.target.closest('.sf-nav-item a');
  var dropdownItem = dropdownLink && dropdownLink.parentElement && dropdownLink.parentElement.classList.contains('sf-nav-item') ? dropdownLink.parentElement : null;
  var dropdownMenu = dropdownItem && dropdownItem.querySelector('.sf-dropdown');
  if (dropdownMenu) {
    event.preventDefault();
    Array.prototype.forEach.call(dropdownItem.parentElement.querySelectorAll('.sf-nav-item.open'), function(item) {
      if (item !== dropdownItem) item.classList.remove('open');
    });
    dropdownItem.classList.toggle('open');
    return;
  }
  if (!event.target.closest('.sf-nav-item')) {
    Array.prototype.forEach.call(document.querySelectorAll('.sf-nav-item.open'), function(item) {
      item.classList.remove('open');
    });
  }
  var button = event.target.closest('[data-nav-toggle]');
  if (!button) return;
  var shell = button.closest('.sf-nav-shell');
  if (!shell) return;
  shell.classList.toggle('open');
  button.setAttribute('aria-expanded', shell.classList.contains('open') ? 'true' : 'false');
});

</script>
